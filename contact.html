<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="google-site-verification" content="notZvvy3fn5NBCAcfut0i4SBJp3iOduLrxj6DJH0j0E" />
    <meta name="description" content="パチスロ設定推測ツール Setting Analyzer Pro へのお問い合わせ。不具合報告、機能要望、機種データの追加・修正などお気軽にどうぞ。">
    <title>お問い合わせ | Setting Analyzer Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9806077794369384"
         crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-inner">
                <p class="app-subtitle"><a href="index.html" class="back-link">&larr; トップに戻る</a></p>
            </div>
        </header>

        <main class="main-content">
            <section class="card page-card">
                <h1 class="page-title">お問い合わせ</h1>

                <div class="page-body">
                    <p>パチスロ設定推測ツールに関するご意見・ご要望・不具合報告などがございましたら、以下のフォームよりお気軽にお問い合わせください。</p>

                    <!-- Formspree: https://formspree.io で無料登録し、フォーム作成後に表示されるIDで action の your-form-id を置き換えてください -->
                    <form class="contact-form" id="contact-form" action="https://formspree.io/f/mojkeavq" method="POST">
                        <input type="hidden" name="_subject" value="[Setting Analyzer Pro] お問い合わせ">
                        <input type="hidden" name="_next" value="https://pachislot-setting.com/contact-thankyou.html">
                        <p class="contact-honeypot" aria-hidden="true">
                            <label>記入しないでください: <input type="text" name="_gotcha" tabindex="-1" autocomplete="off"></label>
                        </p>

                        <div class="form-group">
                            <label for="contact-name">お名前</label>
                            <input type="text" id="contact-name" name="name" placeholder="お名前を入力" required>
                        </div>

                        <div class="form-group">
                            <label for="contact-email">メールアドレス</label>
                            <input type="email" id="contact-email" name="email" placeholder="example@mail.com" required>
                        </div>

                        <div class="form-group">
                            <label for="contact-category">お問い合わせ種別</label>
                            <select id="contact-category" name="category" required>
                                <option value="">-- 選択してください --</option>
                                <option value="不具合報告">不具合報告</option>
                                <option value="機能要望">機能要望</option>
                                <option value="機種データの追加・修正">機種データの追加・修正</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="contact-message">お問い合わせ内容</label>
                            <textarea id="contact-message" name="message" rows="6" placeholder="お問い合わせ内容を入力してください" required></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-primary">
                                <span class="btn-icon">&#9993;</span>
                                送信する
                            </button>
                        </div>
                    </form>

                    <div class="contact-note">
                        <p>※ ご記入いただいたメールアドレスに返信する場合がございます。内容確認後、通常1〜2営業日以内にご連絡いたします。</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <div class="footer-links">
                <a href="privacy.html">プライバシーポリシー</a>
                <a href="terms.html">利用規約</a>
                <a href="contact.html">お問い合わせ</a>
                <a href="about.html">アプリについて</a>
            </div>
            <p>※ 本ツールの推測結果はあくまで参考値です。実際の設定を保証するものではありません。</p>
        </footer>
    </div>
</body>
</html>
